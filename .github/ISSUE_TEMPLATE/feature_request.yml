name: 功能请求
description: 建议新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "## 欢迎提出新想法！"
  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 这个功能要解决什么问题？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你希望如何实现？
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案？
